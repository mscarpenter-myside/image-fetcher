<!DOCTYPE html>
<html lang="pt-BR" data-theme="myside">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySide Image Fetcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           THEME SYSTEM
           ═══════════════════════════════════════════ */

        /* MySide Theme (Default) */
        [data-theme="myside"] {
            --accent: #FB414D;
            --accent-hover: #e0323e;
            --accent-soft: rgba(251, 65, 77, 0.08);
            --accent-glow: rgba(251, 65, 77, 0.25);
            --secondary: #FFAD45;
            --bg: #0A0A0A;
            --bg-elevated: #141414;
            --bg-input: #1a1a1a;
            --surface: #1c1c1c;
            --surface-hover: #242424;
            --text: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #555555;
            --border: #2a2a2a;
            --border-focus: #FB414D;
            --error: #ff6b6b;
            --success: #34d399;
            --header-bg: #0A0A0A;
            --header-border: #1c1c1c;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --preview-bg: #111111;
            --preview-border: #2a2a2a;
            --btn-gradient: linear-gradient(135deg, #FB414D 0%, #d63440 100%);
            --scrollbar-track: #141414;
            --scrollbar-thumb: #333;
        }

        /* Light Theme */
        [data-theme="light"] {
            --accent: #FB414D;
            --accent-hover: #e0323e;
            --accent-soft: rgba(251, 65, 77, 0.05);
            --accent-glow: rgba(251, 65, 77, 0.12);
            --secondary: #FFAD45;
            --bg: #f5f5f7;
            --bg-elevated: #ffffff;
            --bg-input: #ffffff;
            --surface: #ffffff;
            --surface-hover: #f0f0f2;
            --text: #111111;
            --text-secondary: #555555;
            --text-muted: #999999;
            --border: #e2e2e6;
            --border-focus: #FB414D;
            --error: #dc2626;
            --success: #16a34a;
            --header-bg: #0A0A0A;
            --header-border: #0A0A0A;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
            --preview-bg: #f0f0f3;
            --preview-border: #e2e2e6;
            --btn-gradient: linear-gradient(135deg, #FB414D 0%, #d63440 100%);
            --scrollbar-track: #f0f0f2;
            --scrollbar-thumb: #ccc;
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --accent-soft: rgba(129, 140, 248, 0.06);
            --accent-glow: rgba(129, 140, 248, 0.18);
            --secondary: #a78bfa;
            --bg: #0e0e11;
            --bg-elevated: #16161a;
            --bg-input: #1c1c21;
            --surface: #1c1c21;
            --surface-hover: #25252b;
            --text: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --border: #27272a;
            --border-focus: #818cf8;
            --error: #f87171;
            --success: #34d399;
            --header-bg: #0A0A0A;
            --header-border: #18181b;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --preview-bg: #121215;
            --preview-border: #27272a;
            --btn-gradient: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            --scrollbar-track: #16161a;
            --scrollbar-thumb: #3f3f46;
        }

        /* ═══════════════════════════════════════════
           BASE
           ═══════════════════════════════════════════ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.35s ease, color 0.35s ease;
        }

        /* ═══════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════ */

        .header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--header-border);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-svg {
            height: 20px;
            width: auto;
        }

        .header-pipe {
            width: 1px;
            height: 18px;
            background: #333;
        }

        .header-label {
            font-size: 10px;
            font-weight: 600;
            color: #777;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Theme Switcher */
        .theme-switcher {
            display: flex;
            background: #161616;
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
            border: 1px solid #222;
        }

        .theme-btn {
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #555;
            transition: all 0.2s ease;
        }

        .theme-btn:hover {
            color: #999;
            background: #1e1e1e;
        }

        .theme-btn.active {
            background: #252525;
            color: #fff;
        }

        .theme-btn[data-theme="myside"].active {
            color: #FB414D;
        }

        .theme-btn[data-theme="dark"].active {
            color: #818cf8;
        }

        .theme-btn svg {
            width: 14px;
            height: 14px;
        }

        /* ═══════════════════════════════════════════
           CONTENT
           ═══════════════════════════════════════════ */

        .content {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        /* Preview */
        .preview-card {
            background: var(--preview-bg);
            border: 1.5px dashed var(--preview-border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .preview-card.has-image {
            border-style: solid;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .preview-inner {
            width: 100%;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .preview-inner img {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
            display: none;
        }

        .preview-inner img.visible {
            display: block;
            animation: imgIn 0.35s ease;
        }

        @keyframes imgIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .preview-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 28px 20px;
            text-align: center;
        }

        .preview-placeholder .ph-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-placeholder .ph-icon svg {
            width: 22px;
            height: 22px;
            color: var(--accent);
            opacity: 0.7;
        }

        .preview-placeholder p {
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .preview-placeholder strong {
            color: var(--text-secondary);
        }

        .preview-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 5px;
            display: none;
        }

        .preview-card.has-image .preview-badge {
            display: block;
            animation: badgeIn 0.3s ease 0.15s both;
        }

        @keyframes badgeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .image-info {
            display: none;
            padding: 7px 12px;
            background: var(--bg-elevated);
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            justify-content: space-between;
            align-items: center;
        }

        .image-info.visible {
            display: flex;
        }

        .image-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ═══════════════════════════════════════════
           FORM
           ═══════════════════════════════════════════ */

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 90px;
            gap: 8px;
        }

        label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 9px 11px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23777' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            padding-right: 28px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Type toggle */
        .type-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            background: var(--bg-input);
            border-radius: 9px;
            padding: 3px;
            border: 1px solid var(--border);
        }

        .type-opt {
            padding: 8px;
            border: none;
            border-radius: 7px;
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            line-height: 1.3;
        }

        .type-opt:hover {
            color: var(--text-secondary);
        }

        .type-opt.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .type-opt small {
            display: block;
            font-size: 10px;
            opacity: 0.7;
            margin-top: 1px;
            font-weight: 400;
        }

        /* ═══════════════════════════════════════════
           BUTTON
           ═══════════════════════════════════════════ */

        .btn-primary {
            width: 100%;
            padding: 11px;
            background: var(--btn-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-primary svg {
            width: 15px;
            height: 15px;
        }

        .btn-primary.processing {
            pointer-events: none;
        }

        .btn-primary.processing::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            to {
                left: 100%;
            }
        }

        /* ═══════════════════════════════════════════
           STATUS
           ═══════════════════════════════════════════ */

        .status-bar {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 11px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-bar.visible {
            display: flex;
        }

        .status-bar.info {
            background: var(--accent-soft);
            color: var(--text-secondary);
        }

        .status-bar.error {
            background: rgba(239, 68, 68, 0.08);
            color: var(--error);
        }

        .status-bar.success {
            background: rgba(34, 197, 94, 0.08);
            color: var(--success);
        }

        .status-bar svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ═══════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════ */

        .footer {
            padding: 10px 14px;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .footer-text {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.2px;
        }

        .footer-text .accent {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>

        <div class="theme-switcher">
            <button class="theme-btn" data-theme="light" title="Light mode">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
            </button>
            <button class="theme-btn" data-theme="dark" title="Dark mode">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
            <button class="theme-btn active" data-theme="myside" title="MySide theme">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <!-- Preview -->
        <div class="preview-card" id="previewCard">
            <div class="preview-inner">
                <div class="preview-placeholder" id="placeholderText">
                    <div class="ph-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                    </div>
                    <p>Clique com o botão direito em uma imagem e selecione <strong>"Enviar para MySide"</strong></p>
                </div>
                <img id="imagePreview" alt="Preview">
                <div class="preview-badge" id="previewBadge">747px</div>
            </div>
            <div class="image-info" id="imageInfo">
                <span>
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                    </svg>
                    <span id="imageDimensions">—</span>
                </span>
                <span id="imageSize">—</span>
            </div>
        </div>

        <!-- Config -->
        <div class="form-section">
            <div class="section-title">Configuração</div>
            <div class="form-group">
                <label>Tipo de Imagem</label>
                <div class="type-toggle">
                    <button class="type-opt active" data-value="capa" id="typeCapa">Capa<small>Max
                            100kb</small></button>
                    <button class="type-opt" data-value="corpo" id="typeCorpo">Corpo<small>Max 150kb</small></button>
                </div>
            </div>
        </div>

        <!-- SEO -->
        <div class="form-section">
            <div class="section-title">SEO</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" placeholder="">
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" placeholder="" maxlength="2">
                </div>
            </div>
        </div>

        <!-- Action -->
        <button class="btn-primary" id="downloadBtn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Processar e Baixar
        </button>

        <!-- Status -->
        <div class="status-bar" id="statusBar"></div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="footer-text"><span class="accent">MySide</span> Image Fetcher · v1.0</div>
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
